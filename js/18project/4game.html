<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game </title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            
        }
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    
    <h1>Play Game</h1>
    <h2>Guess a number</h2>

    <form class="form">
        <label for="guessField" id="guess">Guess a Number</label>
        <input type="text" name="guessed_number" id="guessField" class="guesField"> <br><br>

        <input type="submit" value="Submit guess" id="subt" class="guessSubmit">

        </form>

        <div class="resultParas">
            <h3>Previous Guess <span class="guesses"></span></h3>
            <h3>Remaining Guess <span class="lastResult">10</span></h3>
            <p class="lowOrHi"></p>

            <script src="practice2.js"></script>
        </div>  
</body>
</html>
