<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game </title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            
        }
        form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
    
    <h1 style="color:blue">Play Game</h1>
    <h2>Guess a number</h2>

    <form>
        <label for="guessField" id="guess">Guess a Number</label>
        <input type="text" name="guessed_number" id="guessField" class="guesField"> <br><br>

        <button type="submit" id="subt" value="submit">Submit</button>

        </form>

        <div class="resultParas">
            <h3>Guess Value :-  <span class="guesses"></span></h3>
            <h3>Remaining Guess :- <span class="remGuess">10</span></h3>
            <p class="lowOrHi"></p>
            <p class="msg"></p>

            <script src="game_gpt.js"></script>
        </div>  
</body>
</html>
