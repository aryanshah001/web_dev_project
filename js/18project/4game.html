<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        #container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #subt{
            margin-left: 8rem;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Guess a number </h1>
        <form>
            <label for="inputNumber">Guess a number :- </label>
            <input type="text" name="guessedNumber" id="inputNumber"><br> <br>

            <button type="submit" id="subt">submit</button><br><br>

        </form>

        <div id="startOver">
            <div> Guessed value = <span class="guessSlot"></span></div><br><br>
            <div>Remaining Guesses = <span class="remaining">10</span></div>
            <div class="lowOrHigh" style="color: red;"></div>
        </div>
    </div>
    </body>
    </html>
