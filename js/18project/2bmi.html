<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background-color: black;
            color: white;
        }

        .button{
            margin-left: 50px;
            background-color: white;
            height: 40px;
            width: 90px;
            font-size: 18px;
        }
        .result{
            font-size: 22px;
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>
    
    <div class="container">

        <form>
    <h1>BMI Calculator</h1>

    <label  for="weight">Enter Weight</label>
    <input type="text" name="weight" id="weight" placeholder="in kg"> <br><br>

    <label for="height">Enter Height</label>
    <input type="text" name="height" id="height" placeholder="In CM"><br><br>

    <button class = "button" type="submit">Calculate</button> <br><br>

    <div class="result"></div><br><br>
    <div class="remark"></div>
    
    </form>
    </div>


    <script>

        const form = document.querySelector('form')
        form.addEventListener('submit',function(e){
            e.preventDefault()

            let bmi;
            const weight = parseInt(document.querySelector('#weight').value)
            const height = parseInt(document.querySelector('#height').value)
            const results = document.querySelector('.result')
            const remark = document.querySelector('.remark')

            //CHECKs
            if (weight === "" || weight < 0 || isNaN(weight)) {
               results.innerHTML = 'plz enter valid weight' 
               return;
            }
            else if (height === "" || height < 0 || isNaN(height)) {
               results.innerHTML = `plz enter valid height ${height}`
               return;
            }
            else{
              bmi = (weight / ((height * height)/10000)).toFixed(2);
              results.innerHTML = `<span>${bmi}</span>`
              return
            }


            //remark
            if (bmi>=30) {
                remark.innerHTML = 'fat'
            }
            else if (bmi>=15) {
                remark.innerHTML = 'med'
            }
            else if (bmi>=1) {
                remark.innerHTML = 'thin'
            }

        })

    </script>

</body>
</html>

// ********** clearing input/remark and result ****************
<script>
        const wet = document.querySelector('#weight')
        const hit = document.querySelector('#height')
        const form = document.querySelector('form')
        const result = document.querySelector('.result')
        const remark = document.querySelector('.remark')

        form.addEventListener('submit',function(e){
            e.preventDefault()

            const weight = parseInt(wet.value)
            const height = parseInt(hit.value)

            wet.addEventListener('focus',clearOutput)
            wet.addEventListener('focus',clearOutput)

            function clearOutput(){
                result.textContent = ""
                remark.textContent = ""
            }


            if (isNaN(weight) || weight < 1) {
                result.textContent = 'plz enter valid weight'
                wet.value = ""
                return;
            }
            if (isNaN(height) || height < 1) {
                result.textContent = 'plz enter valid height'
                hit.value = ""
                return;
            }
            let bmi = height + weight
            result.textContent = `${bmi}`
            form.reset()


            if (bmi > 10) {
                remark.textContent = 'over'
                
               
            }
            else if (bmi > 5) {
                remark.textContent = 'mid'
            }
            else{
                remark.textContent = 'thin'
            }
        })
    </script>
