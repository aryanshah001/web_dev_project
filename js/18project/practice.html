<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        #container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #subt{
            margin-left: 8rem;
        }
    </style>
</head>
<body>
    <div id="container">
        <form>
            <label for="inputNumber">Guess a number :- </label>
            <input type="text" name="guessedNumber" id="inputNumber"><br> <br>

            <button type="submit" id="subt">submit</button><br><br>

        </form>

        <div id="startOver">
            <div> Guessed value = <span class="guessSlot"></span></div><br><br>
            <div>Remaining Guesses = <span class="remaining">10</span></div>
            <div class="lowOrHigh"></div>
        </div>
    </div>

    <script>
        let randomNumber = parseInt(Math.random() * 100) + 1;

        const form = document.querySelector('form')
        const inputNumber = document.querySelector('#inputNumber')
        const startOver = document.querySelector('#startOver')
        const guessSlot = document.querySelector('.guessSlot')
        const remaining = document.querySelector('.remaining')
        const lowOrHigh = document.querySelector('.lowOrHigh')
        const p = document.createElement('p')

        let prevGuess = [];
        let numGuess = 0;
        let PlayGame = true;

        form.addEventListener('submit',function(e){
            e.preventDefault()

            if (!PlayGame) return;
            const guess = parseInt(inputNumber.value)
            validateGuess(guess)
        })

        function validateGuess(guess){
            if (isNaN(guess)) {
                displayMessage('plz enter valid number')
                return;
            }
            if (guess < 1 || guess > 100){
                displayMessage('plz enter value btw 1 and 100')
            }

            prevGuess.push(guess)
            numGuess++;
            cleanupGuess()

            if (numGuess === 10) {
                displayMessage(`Game Over , Random number was ${randomNumber}`)
                endGame()
                return;
            }
            if (guess == randomNumber) {
                displayMessage('congratulation you won the Game')
                endGame()
                return;
            }
        }

        function cleanupGuess() {
            inputNumber.value = "";
            guessSlot.textContent = `${prevGuess.join(' ,')}`
            remaining.textContent = 10 - numGuess

        }

        function displayMessage(message){
            lowOrHigh.innerHTML = `<h2>${message}</h2>`
        }

        function endGame(){
            PlayGame = false;
            inputNumber.setAttribute('disabled',"")
            p.innerHTML = '<h2 id = startGame>Start new Game <h2>'
                startOver.appendChild(p)
        }

        function startGame(){
            PlayGame = true;
            randomNumber = parseInt(Math.random()*100) + 1
            prevGuess = [];
            numGuess = 0;
            guessSlot.textContent = "";
            remaining.textContent = 10;
            lowOrHigh.textContent = '';

            inputNumber.removeAttribute('disabled')
            startOver.removeChild(p)
        }
    </script>

</body>
</html>
