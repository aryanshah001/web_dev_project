<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background-color: black;
            color: white;
        }

        .button{
            margin-left: 50px;
            background-color: white;
            height: 40px;
            width: 90px;
            font-size: 18px;
        }
        #result{
            font-size: 22px;
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>
    
    <div class="container">

        <form>
    <h1>BMI Calculator</h1>

    <label  for="weight">Enter Weight</label>
    <input type="text" name="weight" id="weight" placeholder="in kg"> <br><br>

    <label for="height">Enter Height</label>
    <input type="text" name="height" id="height" placeholder="In CM"><br><br>

    <button class = button>Calculate</button> <br><br>

    <div id="result"></div>
    
    </form>
    </div>


    <script>

        const form = document.querySelector('form')
        form.addEventListener('submit',function(e){
            e.preventDefault()
            const weight = parseInt(document.querySelector('#weight').value)
            const height = parseInt(document.querySelector('#height').value)
            const result = document.querySelector('#result')

            if (weight === "" || weight <=0 || isNaN(weight)) {
                result.innerHTML = 'plz enter valid value'
            }
            else if (height === "" || height <=0 || isNaN(height)) {
                result.innerHTML = 'plz enter valid value'
            }
            else {
                const bmi = height + weight
                result.innerHTML = bmi
                
            }
            
        })
    </script>

</body>
</html>
