    const randomNumber = parseInt(Math.random() * 100 + 1)

        validateGuess(guess)

    }

    function validateGuess(guess){
        if (isNaN(guess)) {
            alert('plz enter valid number')
        }
        else if (guess < 1) {
            alert('plz enter value more than zero')
        }
        else if (guess > 100) {
            alert('plz enter value less than 100')
        }
        else{
            guessSlot.push();

            if (numGuess === 11) {
                displayGuess(guess)
                displayMessage(`Game is over and the random number is ${randomNumber}`)
                endGame()
            }
            else{
                displayGuess(guess)
                checkGuess(guess)
            }
        }
    }

    function checkGuess(guess) {
        if (guess === randomNumber) {
            displayMessage('you guessed it right')
            endGame()
        }
    }

    function displayGuess(guess) {
        inputNumber = ''
        guessSlot.innerHTML += `${guess},`
        numGuess++
        remaining = `10 - ${numGuess}`
