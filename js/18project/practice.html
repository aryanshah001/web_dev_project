<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #subt{
            margin-left: 8rem;
        }
    </style>
    
</head>
<body>
    <div id="container">
        <h1>Guess a number </h1>
        <form>
            <label for="inputNumber">Guess a number :- </label>
            <input type="text" name="guessedNumber" id="inputNumber"><br> <br>

            <button type="submit" id="subt">submit</button><br><br>

        </form>

        <div id="startOver">
            <div> Guessed value = <span class="guessSlot"></span> </div> <br><br>
            <div>Remaining Guesses = <span class="remaining">10</span></div>
            <div class="message" style="color: red;"></div>
        </div>
    </div>

    <script>
        let randomNumber = parseInt(Math.random() * 100) + 1

        const userInput = document.querySelector('#inputNumber')
        const form = document.querySelector('form')
        const startOver = document.querySelector('#startOver')
        const guessSlot = document.querySelector('.guessSlot')
        const remaining = document.querySelector('.remaining')
        const msg = document.querySelector('.message')
        

        let prevGuess = [];
        let numGuess = 0;
        let playGame = true;

        form.addEventListener('submit',function(e){
            e.preventDefault()

            if (!playGame) return;

            const guess = parseInt(userInput.value)
            validateGuess(guess)
        })

        function validateGuess(guess){
            if (isNaN(guess)) {
                displayMessage('plz enter valid Number');
                userInput.value = "";
                return;
            }
            if (guess < 1 || guess > 100) {
                displayMessage('plz enter value btw 1 and  100.')
                userInput.value = "";
                return;
            }
            prevGuess.push(guess)
            numGuess++;
            addingGuess(guess)

            if (numGuess == 10) {
                displayMessage(`you lose the game and the random Number was ${randomNumber}`)
                endGame()


            }
            else if(guess == randomNumber){
                displayMessage('congrats you won the game')
                endGame()

            }
            else if (guess < randomNumber) {
                displayMessage('too low')
            }
            else{
                displayMessage('too high')
            }

        }

        function addingGuess(guess){
            guessSlot.innerHTML = `${prevGuess}`
            remaining.textContent = `${10 - numGuess}`
            userInput.value = "";
        }

        function displayMessage(message){
            msg.textContent = `${message}`
        }

        

        function endGame(){
            playGame = false;
            userInput.disabled = true;
            const button = document.createElement('button')
            button.id = 'start'
            button.textContent = "Play Again"
            button.addEventListener('click',startGame)
            startOver.appendChild(button)

        }

        function startGame(){
            playGame = true;
            randomNumber = parseInt(Math.random() * 100) + 1
            prevGuess = [];
            numGuess = 0;
            userInput.value = "";
            msg.textContent = "";
            guessSlot.textContent = "";
            remaining.textContent = 10
            userInput.disabled = false

            let startbut = document.querySelector('#start')
            if (startbut) {
                startbut.remove()
            }

        }

    </script>

</body>
</html>
