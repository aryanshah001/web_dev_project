<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Text</title>
</head>
<body>
    
    <div id="container">
        <h1>chai aor code</h1>
        <button id="stop">stop</button>
        <button id="start">start</button>
    </div>
    
    <script>
        const printBinod = function(){
            document.querySelector('h1').innerText = 'Binod'
        }

        let clearTime = setTimeout(printBinod, 2000);

        document.querySelector('#stop').addEventListener('click',function(){
            clearTimeout(clearTime)
        })
        document.querySelector('#start').addEventListener('click',function(){
            console.log('binod');
            setTimeout(printBinod, 2000);
            
        })

        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>change color continue</h1>

    <button id="start">start</button>
    <button id="stop">stop</button>

    <script>

     let randomColor = function(){
        let hex = "0123456789ABCDEF"
        let color = "#"

        for (let i = 0; i < 6; i++) {
           color += hex[Math.floor(Math.random() * 16)]
            
        }

        return color;
     }


     let intervalId;
     let changeBgColor = function (){
        if (!intervalId) {
           intervalId = setInterval(bgColor,1000)
        }
         
        function bgColor(){
            document.body.style.backgroundColor = randomColor()
        }
     };

     document.querySelector('#start').addEventListener('click',changeBgColor)


     let stopBgColor =  function(){
        clearInterval(intervalId)
        intervalId = null
     }
     document.querySelector('#stop').addEventListener('click',stopBgColor)
     
    </script>
</body>

  </tr>
  
</table>


        `
    })
