<body>

    <!-- STUDY :- type , timeStamp , preventDefault() , target , toElement , srcElement , currentTarget
             clientX , clientY , screenX , screenY 
             altkey , ctrlkey , shiftkey , keyCode   -->
    
    <ul id="images">
        <li><img id='bird' src="https://tse1.mm.bing.net/th/id/OIP.2037_sZCaTRgav7R82dDfgHaE4?pid=Api&rs=1&c=1&qlt=95&w=125&h=82" alt="bird" width="180px"></li>

        <li><img id="flower" src="https://tse1.mm.bing.net/th/id/OIP.SQ0UJyrF5ADG3K77_ir5JwHaEM?pid=Api&rs=1&c=1&qlt=95&w=145&h=82" alt="flower" width="180px"></li>

        <li><img id="bus" src="https://tse1.mm.bing.net/th/id/OIP.3dod8bVjTVbzRx08OPugewHaE8?pid=Api&rs=1&c=1&qlt=95&w=152&h=101" alt="bus" width="180px"></li>

        <li><img id="girl" src="https://tse1.mm.bing.net/th/id/OIP._GJJcowgQ7HU3OmCN6IFGgHaJ4?pid=Api&rs=1&c=1&qlt=95&w=76&h=102" alt="girl" width="180px"></li>

        <li><a href="https://google.com" target="_blank" id="google">Google</a></li>
    </ul>

    <script>
        //false (default false)= eventPropagation (bubbling:- bottom to top , owl to ul)
        //true = eventPropagation (capturing :- top to bottom)
        // e.stopPropagation() = to stop bubbling and capturing.

        document.getElementById('bird').addEventListener('click', function(){
            alert('bird img clicked');
            
        },false)

        // BOTH ARE SAME (FALSE IS DEFAULT SO NO NEED TO WRITE )
        document.getElementById('bird').addEventListener('click', function(){
            alert('bird img clicked');
            
        })
         

        //TO STOP PROPAGATION.
        document.getElementById('bird').addEventListener('click', function(e){
            alert('bird img clicked');
            e.stopPropagation()    
        })

       
        //STOP DEFAULT BEHAVIOUR.
        document.getElementById('google').addEventListener('click',function(e){
            e.preventDefault()
            e.stopPropagation()
            console.log('google clicked');
            
        })


        document.getElementById('images').addEventListener('click',function(e){
            console.log(e.target);
            
        })


        //REMOVE IMAGE ON CLICK.

        document.getElementById('images').addEventListener('click',function(e){
            // console.log(e.target.parentNode);
            // console.log(e.target.tagName);
            
           let img = e.target.parentNode
           img.remove()    
        })

        //ONTHE ABOVE IF U CLICK ON IMAGE THEN IMAGE WILL REMOVE BUT IF U CLICK ON UL(SMALL DOTS) THEN ALL IMAGES WILL BE REMOVED. SO U CAN KEEP HERE SMALL CHECKS.

        document.getElementById('images').addEventListener('click',function(e){  
            if (e.target.tagName == "IMG") {
                let image = e.target.parentNode
                image.remove()
            }  
        })

        //******************* EXTRA ***********************************************

    // attachEvent and onEvent is outdated. modern eventListener is addEventListener.

    // 1. CHECK PROPERTIES.
    element.addEventListener('click',function(event){
        console.log(event);
        
    })

    // 2.TYPE :- tells what kind of event occured.
    document.addEventListener('click',function(event){
        console.log(event.type);
        
    })

    // 3.Event.target :- tells which element actually triggered the event.
    <button>click me </button>

    document.querySelector('button').addEventListener('click' , (event) => {
        console.log(event.target);
        
    })

    // 4. timeStamp :- tells when the event happened (in milisecond)
    document.addEventListener('click',(event) => {
        console.log(event.timeStamp);
        
    })

    5. event.currentTarget :- then element onwhich the eventListener is attached.
    // <ul>
    //     <li>item1</li>
    //     <li>item2</li>
    // </ul>

    // <script>
        document.querySelector('ul').addEventListener('click',function(event){
            console.log('target :' , event.target);  //OUTPUT = <li> item1.. </li>
            console.log('currentTarget :' , event.currentTarget); <ul>...</ul> 
            
        })
  

    6. event.relatedTarget :- tells which element the mouse is moving to.

    7. e.clientX = position of mouse inside the browser viewport (horizontal (left-right))
    8. e.clientY = position of mouse inside the browser viewport (vertical (top-bottom))

    9. screenX and Y= postion of mouse relative to your full-screen

    10. altkey , shiftkey... = these are boolean properties. Tells was this key pressed when the event happened. if pressed with alt+click, shift+click

    11."keydown" console.log(e.key) = tells which key was pressed. a ,b ..
    12. 'keydown' console.log(e.key); = keyA , shiftleft
    
    





    </script>

</body>
