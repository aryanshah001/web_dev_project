<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning</title>

    <style>
        /* RELATIVE POSITIONING */
        .box{
            border: 2px solid blue;
            width: 200px;
            height: 200px;
            position: relative;
            top: 50px;
            left: 40px;

        }

        /* ABSOLUE POSITIONING */
        .second_box{
            position: absolute;
            border: 2px solid black;

            /* this means move hello-world to bottom-left inside the box */
           
            bottom: 0px;   
            right: 0;
            width: 50%;
            height: 50%;
            background-color: black;
            box-sizing: border-box;
             

            /* this means move hello-world to top-right inside the box */

            /* top: 0;
            right: 0; */

            
        }

    </style>

</head>
<body>

    <div 
    class="box">

        <div class="second_box">
      Hello world
    </div>



</body>
</html>
