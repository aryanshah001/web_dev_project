<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            border: 5px solid black;
            height: 200px;
            width: 200px;
            margin-left: auto;
            margin-right: auto ;
            margin-bottom: 100px;
            background-color: black;

            position: relative;
            top: 50px;
        }

        .box::before{
            content: ' ';
            display: block;
            border: 5px solid blue;
            height: 200px;
            width: 100%;
            top: -20px;
            right: -20px;

            position: absolute;
            /* background-color: blue; */
            
            /* z-index moves line front and back */
            z-index: -1;   
        }

        .box::after{
            content:' ';
            height: 100%;
            width: 100%;
            position: absolute;
            border: 5px solid red;
            bottom: -30px;
            left: -30px;
            z-index: 1;
            background-color: red;
        }

        /* REAL WORLD USECASE */
        a{
            position:relative;
            text-decoration: none;
            color: black;
        }

        a::before{
            content: '  ';
            position: absolute;
            background-color: red;
            bottom: 0;
            width: 100%;
            height: 3px;
            z-index: -1 ;

        }

        a:hover::before{
            
            color: blue;
            height: 16px;
            

        }
    </style>

</head>
<body>
    
    <div class="box"></div>

    <hr />

    <!-- REAL WORLD USECASE -->
    <P>Lorem ipsum dolor sit amet consectetur adipisicing elit. 
    <a href="#">this is link</a>
    Quam ipsum molestiae harum ad exercitationem architecto veritatis sequi delectus ut ipsam.</P>

   
</body>
</html>
