<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Effect</title>

    <style>
        a{
         text-decoration: none;
         color: black;
         border: 1px solid black;
         padding: 5px ;
         
         

        }
        a:hover{
            background-color: red;
            color: white;
            padding: 10px 30px;
            transition: background-color 2.2s , 
                        color 5s,
                        padding 2s;


        }
    </style>

</head>
<body>
    <a href="#"
    class="button">
    Click me
    </a>
</body>
</html>
