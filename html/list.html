<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- shortcut to write number of list ul>li*3 -->

   <h1>My List</h1>

   <h2><u> Unordered list </u> (ul).</h2>

   <ul>
    <li> Hello</li>
    <li>World</li>
    <li>thanks</li>
   </ul>

    <h3>Adding css to list</h3>
   <ul style="list-style-type: square;">
    <li>Hello
        <ol>
            <!-- Subheading -->
            <li>H.1</li>
            <li>H.2</li>
        </ol>
    </li>
    <li>World</li>
    <li>thanks</li>
   </ul>

   <h2><u>Ordered List </u> (ol). </h2>
   <ol>
    <li>Ram</li>
    <li>Shyam</li>
    <li>Gita</li>
   </ol>

   <ol type="I">
    <li>Ram</li>
    <li>Shyam</li>
    <li>Gita</li>
   </ol>


</body>
</html>
