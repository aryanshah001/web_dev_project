<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  
     <!-- INTERNAL CSS  -->
      <!-- Always write inside head tag -->
       <!-- call/refer class and id  -->

    <style>
        .para1 {
            text-align: center;
            background-color: red;
            color: yellow;
        }
    </style>

    <style>
        #para2 {
            text-align: center;
            background-color: rgb(236, 221, 221);
            color: green;
        }
    </style>

</head>
<body>

     <!-- Dot (.) is used to refer class.
          Hash (#) is used to refer id. -->
    
   
    <p class="para1">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Adipisci, vel.</p>

    <p id="para2">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Earum incidunt minus facilis cumque explicabo esse minima animi quia modi laborum.</p>

   
</body>
</html>
